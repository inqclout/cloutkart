<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>CloutKart — AI-Powered Creative Advertising Agency</title>
    <meta name="description" content="CloutKart is a premium AI creative advertising agency that builds winning messages and transforms them into high-converting ads, cinematic campaigns, and performance-driven creative." />
    <meta name="keywords" content="AI advertising agency, AI creative agency, ad creatives, performance marketing creatives, creative strategy, direct response advertising, AI-generated ads, Instagram ad creatives, TikTok ad agency, marketing creatives, winning message strategy" />
    <meta name="author" content="CloutKart" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="theme-color" content="#080808" />
    <meta name="color-scheme" content="dark" />

    <!-- Canonical -->
    <link rel="canonical" href="https://clout-kart.com/" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/webp" sizes="32x32" href="/favicon.webp" />
    <link rel="apple-touch-icon" sizes="180x180" href="/app-icon-512.webp" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph / Facebook / LinkedIn / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://clout-kart.com/" />
    <meta property="og:site_name" content="CloutKart" />
    <meta property="og:title" content="CloutKart — AI-Powered Creative Advertising Agency" />
    <meta property="og:description" content="CloutKart is a premium AI creative advertising agency that builds winning messages and transforms them into high-converting ads, cinematic campaigns, and performance-driven creative." />
    <meta property="og:image" content="https://clout-kart.com/og-image.webp" />
    <meta property="og:image:secure_url" content="https://clout-kart.com/og-image.webp" />
    <meta property="og:image:type" content="image/webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="CloutKart — AI-Powered Creative Advertising Agency" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@clout_kart" />
    <meta name="twitter:creator" content="@clout_kart" />
    <meta name="twitter:title" content="CloutKart — AI-Powered Creative Advertising Agency" />
    <meta name="twitter:description" content="CloutKart is a premium AI creative advertising agency that builds winning messages and transforms them into high-converting ads, cinematic campaigns, and performance-driven creative." />
    <meta name="twitter:image" content="https://clout-kart.com/og-image.webp" />
    <meta name="twitter:image:alt" content="CloutKart — AI-Powered Creative Advertising Agency" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "CloutKart",
      "url": "https://clout-kart.com",
      "logo": "https://clout-kart.com/app-icon-512.webp",
      "description": "CloutKart is a premium AI creative advertising agency that builds winning messages and transforms them into high-converting ads, cinematic campaigns, and performance-driven creative.",
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "url": "https://clout-kart.com/#contact"
      }
    }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "CloutKart",
      "url": "https://clout-kart.com",
      "description": "Premium AI creative advertising agency specializing in high-converting ads, cinematic campaigns, and performance-driven creative.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://clout-kart.com/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: ProfessionalService -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "CloutKart",
      "url": "https://clout-kart.com",
      "logo": "https://clout-kart.com/app-icon-512.webp",
      "image": "https://clout-kart.com/og-image.webp",
      "description": "AI-powered creative advertising agency delivering high-converting ads, cinematic campaigns, and performance-driven creative for brands.",
      "priceRange": "$$",
      "serviceType": [
        "AI Advertising",
        "Creative Strategy",
        "Performance Marketing",
        "Social Media Advertising",
        "Brand Campaign Production"
      ],
      "areaServed": {
        "@type": "Place",
        "name": "Worldwide"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "CloutKart Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "AI Image Ads",
              "description": "Scroll-stopping static visuals engineered for conversion."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Short-form Video Ads",
              "description": "Fast, punchy, conversion-focused video content for Instagram and TikTok."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Performance Marketing Creatives",
              "description": "Direct-response assets built for measurable ROI."
            }
          }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
